version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: healthcare-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: healthcare
    networks:
      - healthcare-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: healthcare-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      MONGODB_URI: mongodb+srv://kartik_2901:kartik123@cluster0.inqa2oz.mongodb.net/healthcare
      JWT_SECRET: ${JWT_SECRET:-change_this_in_production_please}
      JWT_EXPIRES_IN: 7d
      NODE_ENV: production
      MAX_APPOINTMENTS_PER_DAY: 20
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-}
    volumes:
      - uploads-data:/app/uploads
    depends_on:
      - mongodb
    networks:
      - healthcare-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: healthcare-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - healthcare-net

volumes:
  mongo-data:
  uploads-data:

networks:
  healthcare-net:
    driver: bridge
